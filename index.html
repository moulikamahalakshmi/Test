<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fancy Painting Gallery</title>
  <style>
    body {
      margin: 0;
      font-family: 'Georgia', serif;
      background: linear-gradient(to right, #fdfcfb, #e2d1c3);
      color: #333;
    }
    header {
      text-align: center;
      padding: 2rem;
      background-color: #4a3f35;
      color: #fff;
    }
    h1 {
      font-size: 2.5rem;
      margin: 0;
    }
    nav {
      margin-top: 1rem;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      margin: 0 1rem;
      font-weight: bold;
    }
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
      padding: 2rem;
    }
    .gallery img {
      width: 100%;
      height: auto;
      border: 5px solid #4a3f35;
      border-radius: 10px;
      transition: transform 0.3s ease;
    }
    .gallery img:hover {
      transform: scale(1.05);
    }
    footer {
      text-align: center;
      padding: 1rem;
      background-color: #4a3f35;
      color: #fff;
    }
  </style>
</head>
<body>
  <header>
    <h1>Fancy Painting Gallery</h1>
    <nav>
      <a href="#">Home</a>
      <a href="#">Gallery</a>
      <a href="#">About</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <section class="gallery">
    <img src="painting1.jpg" alt="Elegant Painting 1">
    <img src="painting2.jpg" alt="Elegant Painting 2">
    <img src="painting3.jpg" alt="Elegant Painting 3">
    <img src="painting4.jpg" alt="Elegant Painting 4">
  </section>

  <footer>
    <p>&copy; 2026 Fancy Painting Gallery. All rights reserved.</p>
  </footer>
</body>
</html>
